kind = "web"
previewPath = "/db-manager/"
title = "Database Manager"
version = "1.0.0"
id = "artifacts/db-manager"
router = "path"

[[services]]
name = "web"
paths = [ "/db-manager/" ]
localPort = 20414

[services.development]
run = "pnpm --filter @workspace/db-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/db-manager", "run", "build" ]
serve = "static"
publicDir = "artifacts/db-manager/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20414"
BASE_PATH = "/db-manager/"

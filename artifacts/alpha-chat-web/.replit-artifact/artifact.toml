kind = "web"
previewPath = "/"
title = "Alpha Chat Web"
version = "1.0.0"
id = "artifacts/alpha-chat-web"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19025

[services.development]
run = "pnpm --filter @workspace/alpha-chat-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alpha-chat-web", "run", "build" ]
serve = "static"
publicDir = "artifacts/alpha-chat-web/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19025"
BASE_PATH = "/"
